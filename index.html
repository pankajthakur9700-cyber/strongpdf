<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StrongPDF Pro | Ultimate PDF Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .card { background-color: #1e293b; border: 1px solid #334155; transition: all 0.3s ease; height: 100%; }
        .card:hover { border-color: #3b82f6; }
        .speed-gradient { background: linear-gradient(90deg, #3b82f6, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .file-item { cursor: grab; background: #0f172a; padding: 10px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #334155; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10">
    <div class="max-w-7xl mx-auto">
        <header class="text-center mb-16">
            <h1 class="text-5xl md:text-6xl font-black tracking-tighter uppercase mb-4">Strong<span class="text-blue-500">PDF</span> PRO</h1>
            <p class="text-xl font-bold speed-gradient">Ultimate Conversion Suite & Zero Upload Lag ⚡</p>
        </header>

        <div class="grid md:grid-cols-3 gap-8">
            
            <div class="card p-6 rounded-3xl shadow-2xl border-t-4 border-t-blue-600">
                <h2 class="text-xl font-bold mb-4 flex items-center">🔗 Merge & Reorder</h2>
                <input type="file" id="mergeFiles" multiple accept=".pdf" class="block w-full text-xs text-slate-500 mb-4 file:mr-4 file:py-2 file:px-4 file:rounded-full file:bg-blue-600 file:text-white file:border-0 cursor-pointer">
                <div id="fileList" class="max-h-40 overflow-y-auto mb-4 hidden"></div>
                <button onclick="mergePDF()" id="mergeBtn" class="w-full bg-blue-600 py-3 rounded-xl font-bold hover:bg-blue-700 transition">MERGE FILES ⚡</button>
            </div>

            <div class="card p-6 rounded-3xl shadow-2xl border-t-4 border-t-blue-400">
                <h2 class="text-xl font-bold mb-4 flex items-center">✂️ Instant Split</h2>
                <input type="file" id="splitFile" accept=".pdf" class="block w-full text-xs text-slate-500 mb-4 file:mr-4 file:py-2 file:px-4 file:rounded-full file:bg-blue-400 file:text-white file:border-0 cursor-pointer">
                <button onclick="splitAllPages()" id="splitBtn" class="w-full bg-blue-400 py-3 rounded-xl font-bold hover:bg-blue-500 transition text-slate-900">SPLIT ALL PAGES ⚡</button>
            </div>

            <div class="card p-6 rounded-3xl shadow-2xl border-t-4 border-t-emerald-500">
                <h2 class="text-xl font-bold mb-4 flex items-center">🖼️ JPG to PDF</h2>
                <input type="file" id="jpgInput" multiple accept="image/jpeg,image/png" class="block w-full text-xs text-slate-500 mb-4 file:mr-4 file:py-2 file:px-4 file:rounded-full file:bg-emerald-500 file:text-white file:border-0 cursor-pointer">
                <button onclick="convertJpgToPdf()" id="jpgBtn" class="w-full bg-emerald-500 py-3 rounded-xl font-bold hover:bg-emerald-600 transition text-slate-900">CONVERT IMAGES ⚡</button>
            </div>

        </div>

        <div class="mt-12 grid md:grid-cols-4 gap-4 opacity-60">
            <div class="bg-slate-800 p-4 rounded-xl text-center text-xs font-bold border border-slate-700">WORD TO PDF ⏳</div>
            <div class="bg-slate-800 p-4 rounded-xl text-center text-xs font-bold border border-slate-700">EXCEL TO PDF ⏳</div>
            <div class="bg-slate-800 p-4 rounded-xl text-center text-xs font-bold border border-slate-700">PDF TO JPG ⏳</div>
            <div class="bg-slate-800 p-4 rounded-xl text-center text-xs font-bold border border-slate-700">PPT TO PDF ⏳</div>
        </div>

        <footer class="mt-20 text-center text-slate-500 text-xs font-bold">
            STRONGPDF PRO // PERFORMANCE ENGINE v2.4 // AI-POWERED 🤖
        </footer>
    </div>

    <script>
        const { PDFDocument } = PDFLib;
        let selectedMergeFiles = [];

        // --- MERGE LOGIC ---
        document.getElementById('mergeFiles').addEventListener('change', e => {
            const list = document.getElementById('fileList');
            selectedMergeFiles = Array.from(e.target.files);
            if(selectedMergeFiles.length > 0) {
                list.classList.remove('hidden');
                renderMergeList();
            }
        });

        function renderMergeList() {
            const list = document.getElementById('fileList');
            list.innerHTML = "";
            selectedMergeFiles.forEach((f, i) => {
                const item = document.createElement('div');
                item.className = "file-item flex justify-between items-center";
                item.setAttribute('data-id', i);
                item.innerHTML = `<span><span class="text-blue-500 mr-2">${i+1}.</span>${f.name}</span>`;
                list.appendChild(item);
            });
            new Sortable(list, { animation: 150, onEnd: () => {
                const newOrder = [];
                list.querySelectorAll('.file-item').forEach(el => newOrder.push(selectedMergeFiles[el.getAttribute('data-id')]));
                selectedMergeFiles = newOrder;
                renderMergeList();
            }});
        }

        async function mergePDF() {
            if (selectedMergeFiles.length < 2) return alert("Select 2+ files.");
            const mergedPdf = await PDFDocument.create();
            for (const f of selectedMergeFiles) {
                const pdf = await PDFDocument.load(await f.arrayBuffer());
                const pages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                pages.forEach(p => mergedPdf.addPage(p));
            }
            download(await mergedPdf.save(), "StrongPDF_Merged.pdf");
        }

        // --- SPLIT LOGIC ---
        async function splitAllPages() {
            const file = document.getElementById('splitFile').files[0];
            if (!file) return alert("Select a PDF.");
            const src = await PDFDocument.load(await file.arrayBuffer());
            for (let i = 0; i < src.getPageCount(); i++) {
                const newPdf = await PDFDocument.create();
                const [p] = await newPdf.copyPages(src, [i]);
                newPdf.addPage(p);
                download(await newPdf.save(), `Page_${i+1}_${file.name}`);
            }
        }

        // --- JPG TO PDF LOGIC (New!) ---
        async function convertJpgToPdf() {
            const files = document.getElementById('jpgInput').files;
            if (files.length === 0) return alert("Select images first.");
            
            const pdfDoc = await PDFDocument.create();
            for (const file of files) {
                const imgBytes = await file.arrayBuffer();
                let img;
                if (file.type === "image/jpeg") img = await pdfDoc.embedJpg(imgBytes);
                else img = await pdfDoc.embedPng(imgBytes);

                const page = pdfDoc.addPage([img.width, img.height]);
                page.drawImage(img, { x: 0, y: 0, width: img.width, height: img.height });
            }
            download(await pdfDoc.save(), "StrongPDF_Images.pdf");
        }

        function download(bytes, filename) {
            const b = new Blob([bytes], { type: "application/pdf" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(b);
            a.download = filename;
            a.click();
        }
    </script>
</body>
</html>
