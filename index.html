<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StrongPDF Pro | Ultimate PDF Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .card { background-color: #1e293b; border: 4px solid #334155; transition: all 0.3s ease; height: 100%; display: flex; flex-direction: column; }
        .card:hover { border-color: #3b82f6; transform: translateY(-5px); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .btn-action { width: 100%; padding: 1.2rem; border-radius: 1rem; font-weight: 900; text-transform: uppercase; font-size: 1.1rem; transition: all 0.2s; cursor: pointer; border: none; margin-top: auto; }
        .file-item { cursor: grab; background: #0f172a; padding: 12px; border-radius: 12px; margin-bottom: 8px; border: 1px solid #334155; display: flex; align-items: center; justify-content: space-between; }
        .file-item:active { cursor: grabbing; }
        #previewContainer iframe { border-radius: 15px; border: 2px solid #334155; background: white; }
    </style>
</head>
<body class="min-h-screen p-6 md:p-12">
    <div class="max-w-[1600px] mx-auto">
        <header class="text-center mb-16">
            <h1 class="text-6xl md:text-7xl font-black tracking-tighter uppercase mb-2">Strong<span class="text-blue-500">PDF</span> PRO</h1>
            <p class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-blue-600 bg-clip-text text-transparent mb-4">Privacy-First. Lightning Fast. ⚡</p>
        </header>

        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-10 mb-16">
            <div class="card p-8 rounded-[2.5rem] border-t-[12px] border-t-blue-600">
                <h2 class="text-3xl font-black mb-4 underline decoration-blue-500 underline-offset-8">🔗 MERGE</h2>
                <p class="text-sm text-slate-400 mb-6">Drag to reorder. Preview to check. Delete to remove.</p>
                <input type="file" id="mergeFiles" multiple accept=".pdf" class="block w-full text-lg mb-6 cursor-pointer text-slate-500">
                <div id="fileList" class="max-h-80 overflow-y-auto mb-6 hidden border-b-2 border-slate-700 pb-4"></div>
                <button onclick="mergePDF()" id="mergeBtn" class="btn-action bg-blue-600 hover:bg-blue-500 text-white shadow-lg shadow-blue-900/40">MERGE ALL ⚡</button>
            </div>

            <div class="card p-8 rounded-[2.5rem] border-t-[12px] border-t-blue-400">
                <h2 class="text-3xl font-black mb-4 underline decoration-blue-400 underline-offset-8">✂️ SPLIT</h2>
                <p class="text-sm text-slate-400 mb-6">Instant separation of all pages into a ZIP file.</p>
                <input type="file" id="splitFile" accept=".pdf" class="block w-full text-lg mb-6 cursor-pointer text-slate-500">
                <button onclick="splitBulk()" id="splitBtn" class="btn-action bg-blue-400 hover:bg-blue-300 text-slate-900 shadow-lg shadow-blue-400/20">BULK SPLIT ⚡</button>
            </div>

            <div class="card p-8 rounded-[2.5rem] border-t-[12px] border-t-emerald-500">
                <h2 class="text-3xl font-black mb-4 underline decoration-emerald-500 underline-offset-8">🖼️ IMAGES</h2>
                <p class="text-sm text-slate-400 mb-6">Convert multiple photos to a single PDF.</p>
                <input type="file" id="jpgInput" multiple accept="image/*" class="block w-full text-lg mb-6 cursor-pointer text-slate-500">
                <button onclick="convertJpgToPdf()" id="jpgBtn" class="btn-action bg-emerald-500 hover:bg-emerald-400 text-slate-900 shadow-lg shadow-emerald-900/20">CONVERT ⚡</button>
            </div>
        </div>

        <div id="previewWrapper" class="hidden mb-16">
            <h3 class="text-3xl font-black mb-6 text-blue-400 italic underline px-4">Live Preview:</h3>
            <div id="previewContainer" class="w-full h-[700px] bg-slate-900 rounded-[3rem] overflow-hidden shadow-2xl border-4 border-slate-700">
                <iframe id="pdfViewer" class="w-full h-full"></iframe>
            </div>
        </div>

        <footer class="text-center text-slate-600 text-xl font-bold pb-12 border-t border-slate-800 pt-12">
            <div class="flex justify-center gap-12 mb-8 text-blue-500/80">
                <a href="javascript:void(0)" onclick="showPrivacy()" class="hover:text-blue-400 underline">PRIVACY</a>
                <a href="javascript:void(0)" onclick="showTerms()" class="hover:text-blue-400 underline">TERMS</a>
            </div>
            <p class="tracking-[0.5em] uppercase opacity-40 text-sm">STRONGPDF PRO // ENGINE v3.4</p>
        </footer>
    </div>

    <script>
        const { PDFDocument } = PDFLib;
        let selectedMergeFiles = [];

        // --- MERGE LOGIC ---
        document.getElementById('mergeFiles').onchange = (e) => {
            const files = Array.from(e.target.files);
            selectedMergeFiles = [...selectedMergeFiles, ...files];
            renderMergeList();
        };

        function renderMergeList() {
            const list = document.getElementById('fileList');
            if (selectedMergeFiles.length > 0) {
                list.classList.remove('hidden');
                list.innerHTML = "";
                selectedMergeFiles.forEach((f, i) => {
                    const item = document.createElement('div');
                    item.className = "file-item";
                    item.setAttribute('data-id', i);
                    item.innerHTML = `
                        <div class="flex items-center truncate max-w-[70%]">
                            <span class="text-blue-500 mr-3 font-black text-lg">${i+1}</span>
                            <span class="truncate font-medium">${f.name}</span>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="previewFile(${i})" class="bg-slate-800 p-2 rounded-lg hover:bg-blue-600 transition text-xs font-bold">👁️</button>
                            <button onclick="removeFile(${i})" class="bg-slate-800 p-2 rounded-lg hover:bg-red-600 transition text-xs font-bold">✕</button>
                        </div>
                    `;
                    list.appendChild(item);
                });

                // Re-initialize Sortable after rendering
                new Sortable(list, {
                    animation: 150,
                    onEnd: (evt) => {
                        const movedItem = selectedMergeFiles.splice(evt.oldIndex, 1)[0];
                        selectedMergeFiles.splice(evt.newIndex, 0, movedItem);
                        renderMergeList(); // Refresh numbers
                    }
                });
            } else {
                list.classList.add('hidden');
            }
        }

        function removeFile(index) {
            selectedMergeFiles.splice(index, 1);
            renderMergeList();
        }

        function previewFile(index) {
            const file = selectedMergeFiles[index];
            const reader = new FileReader();
            reader.onload = function(e) {
                const blob = new Blob([e.target.result], { type: 'application/pdf' });
                document.getElementById('pdfViewer').src = URL.createObjectURL(blob);
                document.getElementById('previewWrapper').classList.remove('hidden');
                document.getElementById('previewWrapper').scrollIntoView({ behavior: 'smooth' });
            };
            reader.readAsArrayBuffer(file);
        }

        async function mergePDF() {
            if (selectedMergeFiles.length < 2) return alert("Select at least 2 files to merge.");
            const btn = document.getElementById('mergeBtn');
            const originalText = btn.innerText;
            btn.innerText = "MERGING... PLEASE WAIT";
            btn.disabled = true;

            try {
                const mergedPdf = await PDFDocument.create();
                for (const f of selectedMergeFiles) {
                    const arrayBuffer = await f.arrayBuffer();
                    const pdf = await PDFDocument.load(arrayBuffer);
                    const copiedPages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                    copiedPages.forEach((page) => mergedPdf.addPage(page));
                }
                const pdfBytes = await mergedPdf.save();
                downloadFile(pdfBytes, "StrongPDF_Merged.pdf", "application/pdf");
            } catch (error) {
                console.error(error);
                alert("Error merging PDFs. Please ensure files are not password protected.");
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        // --- BULK SPLIT LOGIC ---
        async function splitBulk() {
            const fileInput = document.getElementById('splitFile');
            const file = fileInput.files[0];
            if (!file) return alert("Select a PDF file to split.");
            
            const btn = document.getElementById('splitBtn');
            btn.innerText = "ZIPPING PAGES...";
            
            try {
                const zip = new JSZip();
                const arrayBuffer = await file.arrayBuffer();
                const pdfDoc = await PDFDocument.load(arrayBuffer);
                const pageCount = pdfDoc.getPageCount();

                for (let i = 0; i < pageCount; i++) {
                    const subPdf = await PDFDocument.create();
                    const [copiedPage] = await subPdf.copyPages(pdfDoc, [i]);
                    subPdf.addPage(copiedPage);
                    const pdfBytes = await subPdf.save();
                    zip.file(`Page_${i + 1}.pdf`, pdfBytes);
                }

                const zipBlob = await zip.generateAsync({ type: "blob" });
                downloadFile(zipBlob, `Split_${file.name}.zip`, "application/zip");
            } catch (error) {
                alert("Error splitting PDF.");
            } finally {
                btn.innerText = "BULK SPLIT ⚡";
            }
        }

        // --- IMAGE TO PDF ---
        async function convertJpgToPdf() {
            const files = Array.from(document.getElementById('jpgInput').files);
            if (files.length === 0) return alert("Select images.");
            const btn = document.getElementById('jpgBtn');
            btn.innerText = "CONVERTING...";

            try {
                const pdfDoc = await PDFDocument.create();
                for (const file of files) {
                    const bytes = await file.arrayBuffer();
                    const img = file.type.includes("png") ? await pdfDoc.embedPng(bytes) : await pdfDoc.embedJpg(bytes);
                    const page = pdfDoc.addPage([img.width, img.height]);
                    page.drawImage(img, { x: 0, y: 0, width: img.width, height: img.height });
                }
                const pdfBytes = await pdfDoc.save();
                downloadFile(pdfBytes, "StrongPDF_Images.pdf", "application/pdf");
            } catch (e) {
                alert("Error converting images.");
            } finally {
                btn.innerText = "CONVERT ⚡";
            }
        }

        function downloadFile(data, name, type) {
            const blob = data instanceof Blob ? data : new Blob([data], { type: type });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = name;
            a.click();
            URL.revokeObjectURL(url);
        }

        function showPrivacy() { alert("PRIVACY: All processing is done locally in your browser. No files are uploaded."); }
        function showTerms() { alert("TERMS: Free for personal use. Use at your own risk."); }
    </script>
</body>
</html>
