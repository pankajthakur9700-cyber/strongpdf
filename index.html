<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StrongPDF</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
</head>

<body class="bg-gray-100 min-h-screen">

<div class="max-w-5xl mx-auto p-6">
<h1 class="text-3xl font-bold text-center mb-8">StrongPDF</h1>

<div class="grid md:grid-cols-2 gap-6">

<!-- MERGE PDF -->
<div class="bg-white p-6 rounded-xl shadow">
<h2 class="text-xl font-semibold mb-4">Merge PDF</h2>
<input type="file" id="mergeFiles" multiple class="mb-4">
<button onclick="mergePDF()" class="bg-blue-600 text-white px-4 py-2 rounded">Merge</button>
</div>

<!-- SPLIT PDF -->
<div class="bg-white p-6 rounded-xl shadow">
<h2 class="text-xl font-semibold mb-4">Split PDF (First Page)</h2>
<input type="file" id="splitFile" class="mb-4">
<button onclick="splitPDF()" class="bg-green-600 text-white px-4 py-2 rounded">Split</button>
</div>

<!-- ROTATE PDF -->
<div class="bg-white p-6 rounded-xl shadow">
<h2 class="text-xl font-semibold mb-4">Rotate PDF</h2>
<input type="file" id="rotateFile" class="mb-4">
<button onclick="rotatePDF()" class="bg-purple-600 text-white px-4 py-2 rounded">Rotate 90°</button>
</div>

<!-- IMAGE TO PDF -->
<div class="bg-white p-6 rounded-xl shadow">
<h2 class="text-xl font-semibold mb-4">Image to PDF</h2>
<input type="file" id="imageFile" accept="image/*" class="mb-4">
<button onclick="imageToPDF()" class="bg-red-600 text-white px-4 py-2 rounded">Convert</button>
</div>

</div>
</div>

<script>

async function mergePDF() {
const { PDFDocument } = PDFLib;
const files = document.getElementById('mergeFiles').files;
const mergedPdf = await PDFDocument.create();

for (let file of files) {
const bytes = await file.arrayBuffer();
const pdf = await PDFDocument.load(bytes);
const copiedPages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
copiedPages.forEach(page => mergedPdf.addPage(page));
}

const mergedBytes = await mergedPdf.save();
downloadFile(mergedBytes, "merged.pdf");
}

async function splitPDF() {
const { PDFDocument } = PDFLib;
const file = document.getElementById('splitFile').files[0];
const bytes = await file.arrayBuffer();
const pdf = await PDFDocument.load(bytes);

const newPdf = await PDFDocument.create();
const [firstPage] = await newPdf.copyPages(pdf, [0]);
newPdf.addPage(firstPage);

const newBytes = await newPdf.save();
downloadFile(newBytes, "split.pdf");
}

async function rotatePDF() {
const { PDFDocument, degrees } = PDFLib;
const file = document.getElementById('rotateFile').files[0];
const bytes = await file.arrayBuffer();
const pdf = await PDFDocument.load(bytes);

pdf.getPages().forEach(page => {
page.setRotation(degrees(90));
});

const newBytes = await pdf.save();
downloadFile(newBytes, "rotated.pdf");
}

async function imageToPDF() {
const { PDFDocument } = PDFLib;
const file = document.getElementById('imageFile').files[0];
const bytes = await file.arrayBuffer();

const pdf = await PDFDocument.create();
const image = await pdf.embedJpg(bytes);
const page = pdf.addPage([image.width, image.height]);
page.drawImage(image, { x: 0, y: 0, width: image.width, height: image.height });

const pdfBytes = await pdf.save();
downloadFile(pdfBytes, "image.pdf");
}

function downloadFile(bytes, filename) {
const blob = new Blob([bytes], { type: "application/pdf" });
const link = document.createElement("a");
link.href = URL.createObjectURL(blob);
link.download = filename;
link.click();
}

</script>

</body>
</html>
